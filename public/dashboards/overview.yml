# Overview dashboard — structured into 4 visual bands:
#   A. Hero KPI row (6 tiles × 2 cols, Artemis-style)
#   B. Two headline trend charts (6 cols each)
#   C. Secondary KPI row (4 tiles × 3 cols)
#   D. Sector launcher — one tile per sector (linkTo routes user into sector)
metrics:
  # --- Band A: Hero KPIs (row 1) ---
  - id: overview_kpi_transactions
    gridRow: 1
    gridColumn: 1 / span 2
    minHeight: 140px
  - id: overview_kpi_active_accounts
    gridRow: 1
    gridColumn: 3 / span 2
    minHeight: 140px
  - id: overview_kpi_staked_gno
    gridRow: 1
    gridColumn: 5 / span 2
    minHeight: 140px
  - id: overview_kpi_validators
    gridRow: 1
    gridColumn: 7 / span 2
    minHeight: 140px
  - id: overview_kpi_stablecoin_supply
    gridRow: 1
    gridColumn: 9 / span 2
    minHeight: 140px
  - id: overview_kpi_gpay_volume
    gridRow: 1
    gridColumn: 11 / span 2
    minHeight: 140px

  # --- Band B: Headline trend charts (rows 2-3) ---
  - id: overview_gno_supply_daily
    gridRow: 2 / span 2
    gridColumn: 1 / span 6
    minHeight: 340px
  - id: overview_stablecoins_supply_latest
    gridRow: 2 / span 2
    gridColumn: 7 / span 6
    minHeight: 340px

  # --- Band C: Secondary KPIs (row 4) — distinct from hero ---
  - id: overview_stake_api
    gridRow: 4
    gridColumn: 1 / span 3
    minHeight: 120px
  - id: overview_esg
    gridRow: 4
    gridColumn: 4 / span 3
    minHeight: 120px
  - id: overview_bridges_total_volume
    gridRow: 4
    gridColumn: 7 / span 3
    minHeight: 120px
  - id: overview_yields_lending_tvl
    gridRow: 4
    gridColumn: 10 / span 3
    minHeight: 120px

  # --- Band D: Sector launcher (rows 5-7, 3 per row × 4 cols) ---
  - id: overview_sector_gnosispay
    gridRow: 5
    gridColumn: 1 / span 4
    minHeight: 130px
  - id: overview_sector_consensus
    gridRow: 5
    gridColumn: 5 / span 4
    minHeight: 130px
  - id: overview_sector_bridges
    gridRow: 5
    gridColumn: 9 / span 4
    minHeight: 130px
  - id: overview_sector_tokens
    gridRow: 6
    gridColumn: 1 / span 4
    minHeight: 130px
  - id: overview_sector_circles
    gridRow: 6
    gridColumn: 5 / span 4
    minHeight: 130px
  - id: overview_sector_yields
    gridRow: 6
    gridColumn: 9 / span 4
    minHeight: 130px
  - id: overview_sector_onchain
    gridRow: 7
    gridColumn: 1 / span 4
    minHeight: 130px
  - id: overview_sector_network
    gridRow: 7
    gridColumn: 5 / span 4
    minHeight: 130px
  - id: overview_sector_esg
    gridRow: 7
    gridColumn: 9 / span 4
    minHeight: 130px
