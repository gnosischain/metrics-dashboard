# Overview — the ecosystem front page. BENTO layout (not a uniform wall of boxes):
#   Top band  a feature hero chart (8 cols, 2 rows tall) FLANKED by a 2x2 of the
#             flagship KPI tiles — they interlock instead of stacking in rows.
#   R3        tight KPI strip (network + security), short tiles
#   R4        paired supply trends
#   R5        quiet stat footer (single latest / all-time values)
# The 8 KPI tiles double as the sector launcher. Deliberate size variation gives
# the page rhythm; short tile heights keep it dense instead of sparse.
metrics:
  # --- Bento top: hero (cols 1-8, rows 1-2) + 4 flagship KPIs beside it (cols 9-12) ---
  - id: overview_transactions_daily
    gridRow: 1 / span 2
    gridColumn: 1 / span 8
    minHeight: 320px
  - id: overview_kpi_dex_volume
    gridRow: 1
    gridColumn: 9 / span 2
    minHeight: 154px
  - id: overview_kpi_gpay_active_users
    gridRow: 1
    gridColumn: 11 / span 2
    minHeight: 154px
  - id: overview_kpi_gpay_volume
    gridRow: 2
    gridColumn: 9 / span 2
    minHeight: 154px
  - id: overview_kpi_circles_minters
    gridRow: 2
    gridColumn: 11 / span 2
    minHeight: 154px

  # --- R3: tight KPI strip — network + security ---
  - id: overview_kpi_transactions
    gridRow: 3
    gridColumn: 1 / span 3
    minHeight: 116px
  - id: overview_kpi_staked_gno
    gridRow: 3
    gridColumn: 4 / span 3
    minHeight: 116px
  - id: overview_kpi_validators
    gridRow: 3
    gridColumn: 7 / span 3
    minHeight: 116px
  - id: overview_kpi_stablecoin_supply
    gridRow: 3
    gridColumn: 10 / span 3
    minHeight: 116px

  # --- R4: paired supply trends ---
  - id: overview_gno_supply_daily
    gridRow: 4
    gridColumn: 1 / span 6
    minHeight: 300px
  - id: overview_stablecoins_supply_daily
    gridRow: 4
    gridColumn: 7 / span 6
    minHeight: 300px

  # --- R5: quiet stat footer ---
  - id: overview_stake_api
    gridRow: 5
    gridColumn: 1 / span 3
    minHeight: 116px
  - id: overview_esg
    gridRow: 5
    gridColumn: 4 / span 3
    minHeight: 116px
  - id: overview_bridges_total_volume
    gridRow: 5
    gridColumn: 7 / span 3
    minHeight: 116px
  - id: overview_yields_lending_tvl
    gridRow: 5
    gridColumn: 10 / span 3
    minHeight: 116px
