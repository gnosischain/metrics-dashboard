tabs:
  - name: Overview
    description: Volume, netflow and bridge activity KPIs and trends
    order: 1
    icon: 📊
    iconClass: chart-line
    metrics:
      - id: api_bridges_kpi_total_volume_all_time
        gridRow: 1
        gridColumn: 1 / span 3
        minHeight: 120px
      - id: api_bridges_kpi_total_netflow_all_time
        gridRow: 1
        gridColumn: 4 / span 3
        minHeight: 120px
      - id: api_bridges_kpi_distinct_bridges_all_time
        gridRow: 1
        gridColumn: 7 / span 3
        minHeight: 120px
      - id: api_bridges_kpi_distinct_chains_all_time
        gridRow: 1
        gridColumn: 10 / span 3
        minHeight: 120px
      - id: api_bridges_cum_netflow_weekly_by_bridge
        gridRow: 2
        gridColumn: 1 / span 12
        minHeight: 420px
      - id: api_bridges_kpi_volume_7d
        gridRow: 3
        gridColumn: 1 / span 6
        minHeight: 120px
      - id: api_bridges_kpi_netflow_7d
        gridRow: 3
        gridColumn: 7 / span 6
        minHeight: 120px
  - name: Flows
    description: Inbound and outbound bridge flow Sankey diagrams
    order: 2
    icon: 🌊
    iconClass: flow
    metrics:
      - id: api_bridges_sankey_gnosis_out_ranges
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 625px
      - id: api_bridges_sankey_gnosis_in_ranges
        gridRow: 1
        gridColumn: 7 / span 6
        minHeight: 625px
  - name: Token Flows
    description: Token-level inflows, outflows and daily netflow by bridge
    order: 3
    icon: 💱
    iconClass: token-dot
    metrics:
      - id: api_bridges_sankey_gnosis_out_by_token_7d
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 420px
      - id: api_bridges_sankey_gnosis_in_by_token_7d
        gridRow: 1
        gridColumn: 7 / span 6
        minHeight: 420px
      - id: api_bridges_token_netflow_daily_by_bridge
        gridRow: 2
        gridColumn: 1 / span 12
        minHeight: 450px
