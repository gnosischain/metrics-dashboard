tabs:
  - name: Overview
    order: 1
    icon: 📊
    iconClass: chart-line
    metrics:
      - id: api_execution_circles_v2_humans_cnt_latest
        gridRow: 1
        gridColumn: 1 / span 4
        minHeight: 110px
      - id: api_execution_circles_v2_groups_cnt_latest
        gridRow: 1
        gridColumn: 5 / span 4
        minHeight: 110px
      - id: api_execution_circles_v2_orgs_cnt_latest
        gridRow: 1
        gridColumn: 9 / span 4
        minHeight: 110px
      - id: api_execution_circles_v2_avatars_cumulative
        gridRow: 2 / span 2
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_execution_circles_v2_total_supply_daily
        gridRow: 2 / span 2
        gridColumn: 7 / span 6
        minHeight: 450px

  - name: Network
    order: 2
    icon: 🕸️
    iconClass: network
    timeRanges: true
    metrics:
      - id: api_execution_circles_v2_avatars
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_execution_circles_v2_avatars_cumulative
        gridRow: 1
        gridColumn: 7 / span 6
        minHeight: 450px
      - id: api_execution_circles_v2_active_trusts_daily
        gridRow: 2
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_execution_circles_v2_trust_flow_daily
        gridRow: 2
        gridColumn: 7 / span 6
        minHeight: 450px

  - name: Supply
    order: 3
    icon: 💰
    iconClass: coins
    timeRanges: true
    metrics:
      - id: api_execution_circles_v2_total_supply_daily
        gridRow: 1
        gridColumn: 1 / span 8
        minHeight: 450px
      - id: api_execution_circles_v2_token_count_daily
        gridRow: 1
        gridColumn: 9 / span 4
        minHeight: 450px
      - id: api_execution_circles_v2_supply_by_holder_type_daily
        gridRow: 2
        gridColumn: 1 / span 8
        minHeight: 450px
      - id: api_execution_circles_v2_holder_count_by_type_daily
        gridRow: 2
        gridColumn: 9 / span 4
        minHeight: 450px

  - name: User
    order: 4
    icon: 👤
    iconClass: user
    globalFilterField: avatar
    globalFilterLabel: Avatar Address
    searchable: true
    requireExplicitFilter: true
    searchPlaceholder: Paste avatar address (0x...)
    globalFilterVertical: true
    timeRanges: true
    metrics:
      - id: api_execution_circles_v2_avatar_total_balance_latest
        gridRow: 1
        gridColumn: 1 / span 3
        minHeight: 110px
      - id: api_execution_circles_v2_avatar_trusts_given_latest
        gridRow: 1
        gridColumn: 4 / span 3
        minHeight: 110px
      - id: api_execution_circles_v2_avatar_trusts_received_latest
        gridRow: 1
        gridColumn: 7 / span 3
        minHeight: 110px
      - id: global_filter
        gridRow: 1
        gridColumn: 10 / span 3
        minHeight: 110px
      - id: api_execution_circles_v2_avatar_balances_daily
        gridRow: 3
        gridColumn: 1 / span 8
        minHeight: 450px
      - id: api_execution_circles_v2_avatar_holdings_by_token
        gridRow: 3
        gridColumn: 9 / span 4
        minHeight: 450px
      - id: api_execution_circles_v2_avatar_trusts_daily
        gridRow: 4
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_execution_circles_v2_avatar_trust_relations
        gridRow: 4
        gridColumn: 7 / span 6
        minHeight: 450px
      - id: api_execution_circles_v2_avatar_metadata
        gridRow: 5
        gridColumn: 1 / span 12
        minHeight: 300px
