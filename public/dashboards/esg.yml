tabs:
  - name: Overview
    description: Annualised carbon emissions, energy use and network footprint
    order: 1
    icon: 📊
    iconClass: bar-chart-2
    metrics:
      - id: api_esg_carbon_emissions_annualised_latest
        gridRow: 1
        gridColumn: 1 / span 3
        minHeight: 120px
      - id: api_esg_energy_consumption_annualised_latest
        gridRow: 1
        gridColumn: 4 / span 3
        minHeight: 120px
      - id: api_esg_cif_network_vs_countries_daily
        gridRow: 1 / span 2
        gridColumn: 7 / span 6
        minHeight: 622px
      - id: api_esg_carbon_emissions_daily
        gridRow: 2
        gridColumn: 1 / span 6
        minHeight: 490px
  - name: Breakdown
    description: Emissions by category, annual estimates and node counts
    order: 2
    icon: ''
    iconClass: search
    timeRanges: true
    metrics:
      - id: api_esg_info_category_daily
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_esg_info_annual_daily
        gridRow: 1
        gridColumn: 7 / span 6
        minHeight: 450px
      - id: api_esg_estimated_nodes_daily
        gridRow: 2
        gridColumn: 1 / span 12
        minHeight: 450px
  - name: Methodology
    description: Calculation methodology, definitions and data sources
    order: 3
    icon: 📝
    iconClass: file-text
    metrics:
      - id: text_esg_methodology
        gridRow: 1
        gridColumn: 1 / span 12
        minHeight: 12100px
