tabs:
  - name: Overview
    order: 1
    icon: "📊"
    iconClass: "chart-line"
    metrics:
      - id: api_execution_yields_overview_sdai_supply
        gridRow: 1
        gridColumn: 1 / span 4
        minHeight: 110px
      - id: api_execution_yields_overview_lending_lenders
        gridRow: 1
        gridColumn: 5 / span 4
        minHeight: 110px
      - id: api_execution_yields_overview_lp_tvl
        gridRow: 1
        gridColumn: 9 / span 4
        minHeight: 110px
      - id: api_execution_yields_overview_sdai_apy
        gridRow: 2
        gridColumn: 1 / span 4
        minHeight: 110px
      - id: api_execution_yields_overview_lending_best_apy
        gridRow: 2
        gridColumn: 5 / span 4
        minHeight: 110px
      - id: api_execution_yields_overview_lp_best_apr
        gridRow: 2
        gridColumn: 9 / span 4
        minHeight: 110px
      - id: api_execution_yields_opportunities_latest
        gridRow: 3
        gridColumn: 1 / span 12
        minHeight: 450px
      - id: historical_yield_sdai
        gridRow: 4
        gridColumn: 1 / span 12
        minHeight: 450px

  - name: Lending yields
    order: 2
    icon: "💰"
    iconClass: "lending"
    globalFilterField: 'token'
    globalControlsPlacement: top
    timeRanges: true
    metrics:
      - id: api_execution_yields_lending_lenders_count_7d
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 140px
      - id: api_execution_yields_lending_borrowers_count_7d
        gridRow: 2
        gridColumn: 1 / span 6
        minHeight: 140px
      - id: api_execution_yields_lending_tvl_by_token_latest
        gridRow: 1 / span 2
        gridColumn: 7 / span 6
        minHeight: 291px
      - id: api_execution_yields_lending_balance_cohorts_holders_daily
        gridRow: 3
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_execution_yields_lending_balance_cohorts_value_daily
        gridRow: 3
        gridColumn: 7 / span 6
        minHeight: 450px
      - id: api_execution_yields_lending_daily
        gridRow: 4
        gridColumn: 1 / span 12
        minHeight: 450px
      - id: api_execution_yields_lending_activity_counts_weekly
        gridRow: 5
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_execution_yields_lending_activity_volumes_weekly
        gridRow: 5
        gridColumn: 7 / span 6
        minHeight: 450px

  - name: Pool Yields
    order: 3
    icon: "📊"
    iconClass: "pool"
    globalFilterField: 'token'
    secondaryGlobalFilterField: 'pool'
    globalControlsPlacement: top
    timeRanges: true
    metrics:
      - id: api_execution_yields_pools_tvl_latest
        gridRow: 1
        gridColumn: 1 / span 3
        minHeight: 110px
      - id: api_execution_yields_pools_volume_7d
        gridRow: 1
        gridColumn: 4 / span 3
        minHeight: 110px
      - id: api_execution_yields_pools_fees_7d
        gridRow: 1
        gridColumn: 7 / span 3
        minHeight: 110px
      - id: api_execution_yields_pools_lps_count_7d
        gridRow: 1
        gridColumn: 10 / span 3
        minHeight: 110px
      - id: api_execution_yields_pools_tvl_by_pool_latest
        gridRow: 2
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_execution_yields_pools_tvl_token_daily
        gridRow: 2
        gridColumn: 7 / span 6
        minHeight: 450px
      - id: api_execution_yields_pools_net_apr_daily
        gridRow: 3
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_execution_yields_pools_lp_activity_daily
        gridRow: 3
        gridColumn: 7 / span 6
        minHeight: 450px
      - id: api_execution_yields_pools_fees_usd_daily
        gridRow: 4
        gridColumn: 1 / span 4
        minHeight: 450px
      - id: api_execution_yields_pools_swap_count_daily
        gridRow: 4
        gridColumn: 5 / span 4
        minHeight: 450px
      - id: api_execution_yields_pools_volume_daily
        gridRow: 4
        gridColumn: 9 / span 4
        minHeight: 450px

  - name: User Portfolio
    order: 4
    icon: "👤"
    iconClass: "user"
    globalFilterField: wallet_address
    globalFilterLabel: Wallet
    searchable: true
    searchPlaceholder: Paste wallet address...
    globalControlsPlacement: top
    metrics:
      - id: api_execution_yields_user_kpi_total_lp_fees
        gridRow: 1
        gridColumn: 1 / span 3
        minHeight: 110px
      - id: api_execution_yields_user_kpi_lending_balance
        gridRow: 1
        gridColumn: 4 / span 3
        minHeight: 110px
      - id: api_execution_yields_user_kpi_active_lp_positions
        gridRow: 1
        gridColumn: 7 / span 3
        minHeight: 110px
      - id: api_execution_yields_user_kpi_active_lending_positions
        gridRow: 1
        gridColumn: 10 / span 3
        minHeight: 110px
      - id: api_execution_yields_user_lp_positions
        gridRow: 2
        gridColumn: 1 / span 12
        minHeight: 450px
        tabGroup: positions
        tabLabel: LP Positions
      - id: api_execution_yields_user_lending_positions
        gridRow: 2
        gridColumn: 1 / span 12
        minHeight: 450px
        tabGroup: positions
        tabLabel: Lending Positions
      - id: api_execution_yields_user_fee_collections_daily
        gridRow: 3
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_execution_yields_user_lending_balances_daily
        gridRow: 3
        gridColumn: 7 / span 6
        minHeight: 450px
      - id: api_execution_yields_user_activity
        gridRow: 4
        gridColumn: 1 / span 12
        minHeight: 450px
