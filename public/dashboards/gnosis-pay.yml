  - name: Balances
    chains: [gnosis, celo]
    description: Wallet balances, composition and holder cohorts
    order: 5
    icon: 💰
    iconClass: wallet
    timeRanges: true
    metrics:
      - id: api_execution_gpay_total_balance
        celoId: api_celo_gpay_total_balance
        celoGridColumn: 1 / span 6
        gridRow: 1
        gridColumn: 1 / span 3
        minHeight: 120px
      - id: api_execution_gpay_gno_total_balance
        gridRow: 1
        gridColumn: 4 / span 3
