        celoId: api_celo_gpay_balance_cohorts_value_daily
        gridRow: 4
        gridColumn: 7 / span 6
        minHeight: 450px

  - name: User Portfolio
    description: Per-wallet balances, activity and lifetime stats
    enabled: false
    order: 6
    icon: 👤
    iconClass: user
    globalFilterField: wallet_address
    globalFilterLabel: Wallet
    searchable: true
    requireExplicitFilter: true
    globalFilterSourceMetric: api_execution_gpay_user_top_wallets
    explicitFilterValidationMetric: api_execution_gpay_user_lifetime_tenure_days
    searchPlaceholder: Paste wallet address and press Enter...
    globalControlsPlacement: top
    emptyState:
      title: Explore your Gnosis Pay portfolio
      description: Paste a wallet address to load balances and activity cards.
      emptyResultsTitle: This wallet is not a Gnosis Pay wallet
      emptyResultsDescription: Try another wallet address.
      iconClass: user
    globalFilterVertical: true
    metrics:
      - id: api_execution_gpay_user_lifetime_tenure_days
        gridRow: 1
        gridColumn: 1 / span 4
        minHeight: 120px
