tabs:
  # Shared tabs carry `chains: [gnosis, celo]` and a per-card `celoId`. A per-tab
  # chain toggle swaps only that tab's card data (api_execution_gpay_* ↔
  # api_celo_gpay_*) — the sidebar menu never changes. Gnosis-only tabs
  # (Cashback / User Portfolio / Flows) omit `chains` and show no toggle.
  - name: Overview
    chains: [gnosis, celo]
    description: Payment volume, counts and token mix
    order: 1
    icon: 📊
    iconClass: chart-line
    resolutionToggle: true
    defaultResolution: weekly
    timeRanges: true
    metrics:
      - id: api_execution_gpay_total_volume
        celoId: api_celo_gpay_total_volume
        gridRow: 1
        gridColumn: 1 / span 3
        minHeight: 120px
      - id: api_execution_gpay_volume_7d
        celoId: api_celo_gpay_volume_7d
        gridRow: 1
        gridColumn: 4 / span 3
        minHeight: 120px
      - id: api_execution_gpay_total_payments
        celoId: api_celo_gpay_total_payments
        gridRow: 1
        gridColumn: 7 / span 3
        minHeight: 120px
      - id: api_execution_gpay_payments_7d
        celoId: api_celo_gpay_payments_7d
        gridRow: 1
        gridColumn: 10 / span 3
        minHeight: 120px
      - id: api_execution_gpay_volume_payments_by_token_weekly
        celoId: api_celo_gpay_volume_payments_by_token_weekly
        gridRow: 2
        gridColumn: 1 / span 6
        minHeight: 470px
      - id: api_execution_gpay_payments_by_token_weekly
        celoId: api_celo_gpay_payments_by_token_weekly
        gridRow: 2
        gridColumn: 7 / span 6
        minHeight: 470px

  - name: Activity
    chains: [gnosis, celo]
    description: Funded wallets, active users and hourly activity
    order: 2
    icon: 👥
    iconClass: users
    resolutionToggle: true
    defaultResolution: weekly
    metrics:
      - id: api_execution_gpay_total_funded
        celoId: api_celo_gpay_total_funded
        gridRow: 1
        gridColumn: 7 / span 3
        minHeight: 120px
      - id: api_execution_gpay_active_users_7d
        celoId: api_celo_gpay_active_users_7d
        gridRow: 1
        gridColumn: 10 / span 3
        minHeight: 120px
      - id: api_execution_gpay_funded_addresses_weekly
        celoId: api_celo_gpay_funded_addresses_weekly
        gridRow: 1 / span 2
        gridColumn: 1 / span 6
        minHeight: 432px
      - id: api_execution_gpay_payments_hourly
        celoId: api_celo_gpay_payments_hourly
        gridRow: 2
        gridColumn: 7 / span 6
        minHeight: 300px
      - id: api_execution_gpay_activity_by_action_weekly
        celoId: api_celo_gpay_activity_by_action_weekly
        gridRow: 3
        gridColumn: 1 / span 12
        minHeight: 450px

