        gridRow: 2
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_consensus_staked_daily
        gridRow: 2
        gridColumn: 7 / span 6
        minHeight: 450px
      - id: api_consensus_validators_balances_dist_daily
        gridRow: 3
        gridColumn: 1 / span 12
        minHeight: 450px
      - id: api_consensus_withdrawal_credentials_freq_daily
        gridRow: 4
        gridColumn: 1 / span 12
        minHeight: 450px
      - id: api_consensus_validators_income_total_daily
        gridRow: 5
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_consensus_validators_apy_mean_daily
        gridRow: 5
        gridColumn: 7 / span 6
        minHeight: 450px
      - id: api_consensus_deposits_withdrawals_cumulative_daily
        gridRow: 6
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_consensus_consolidations_daily
        gridRow: 6
