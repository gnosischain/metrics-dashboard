        gridColumn: 10 / span 3
        minHeight: 120px
      - id: api_execution_gnosis_app_kpi_gp_wallets_latest
        gridRow: 2
        gridColumn: 1 / span 3
        minHeight: 120px
      - id: api_execution_gnosis_app_kpi_repeat_purchase_rate_latest
        gridRow: 2
        gridColumn: 4 / span 3
        minHeight: 120px
      - id: api_execution_gnosis_app_users_activity_weekly
