tabs:
  - name: Overview
    description: User totals, new signups and monthly registrations
    order: 1
    icon: 📊
    iconClass: chart-line
    resolutionToggle: true
    defaultResolution: weekly
    timeRanges: true
    metrics:
      # KPI row (Swaps / TopUp KPIs live on their own tabs — no cross-tab repeats)
      - id: api_execution_gnosis_app_kpi_total_users
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 120px
      - id: api_execution_gnosis_app_kpi_new_users_7d
        gridRow: 1
        gridColumn: 7 / span 6
        minHeight: 120px
      # GT onboarding — new identity/profile registrations (envio_ga avatar.created_at)
      # (User Activity + Activity-by-Action charts live on the Activity tab; Overview is KPI + onboarding)
      - id: api_execution_gnosis_app_gt_registrations_monthly
        gridRow: 2
        gridColumn: 1 / span 12
        minHeight: 440px

  - name: Activity
    description: Active users, repeat purchases and actions by type
    order: 2
    icon: 👥
    iconClass: users
    resolutionToggle: true
    defaultResolution: weekly
    metrics:
      # GP Wallets KPI lives on the GP Wallets tab (removed here to avoid a deep+deep repeat)
      - id: api_execution_gnosis_app_kpi_weekly_economically_active_users_latest
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 120px
      - id: api_execution_gnosis_app_kpi_repeat_purchase_rate_latest
        gridRow: 1
        gridColumn: 7 / span 6
        minHeight: 120px
      - id: api_execution_gnosis_app_kpi_mau_latest
        gridRow: 2
        gridColumn: 1 / span 4
        minHeight: 120px
      - id: api_execution_gnosis_app_kpi_dau_latest
        gridRow: 2
        gridColumn: 5 / span 4
        minHeight: 120px
      - id: api_execution_gnosis_app_kpi_weekly_active_users_latest
        gridRow: 2
        gridColumn: 9 / span 4
        minHeight: 120px
      # Active Users = the Gnosis-Pay-inclusive definition (counts card-wallet transactions as
      # active); Daily / Weekly / Monthly via the section resolution toggle.
      - id: api_execution_gnosis_app_active_users_incl_gpay_weekly
        gridRow: 3
        gridColumn: 1 / span 6
        minHeight: 440px
      - id: api_execution_gnosis_app_weekly_economically_active_users
        gridRow: 3
        gridColumn: 7 / span 6
        minHeight: 440px
      - id: api_execution_gnosis_app_cumulative_users_weekly
        gridRow: 4
        gridColumn: 1 / span 6
        minHeight: 440px
      - id: api_execution_gnosis_app_activity_by_action_weekly
        gridRow: 4
        gridColumn: 7 / span 6
        minHeight: 440px

  - name: Swaps
    description: Volume, counts and breakdowns by pair and solver
    order: 3
    icon: 🔄
    iconClass: exchange
    resolutionToggle: true
    defaultResolution: weekly
    metrics:
      - id: api_execution_gnosis_app_kpi_swaps_7d
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 120px
      - id: api_execution_gnosis_app_kpi_swap_volume_7d
        gridRow: 1
        gridColumn: 7 / span 6
        minHeight: 120px
     # - id: api_execution_gnosis_app_kpi_swap_fees_7d
     #   gridRow: 1
     #   gridColumn: 7 / span 3
     #   minHeight: 120px
      - id: api_execution_gnosis_app_swaps_weekly_chart
        gridRow: 2
        gridColumn: 1 / span 12
        minHeight: 440px
      - id: api_execution_gnosis_app_swaps_by_pair_weekly
        gridRow: 3
        gridColumn: 1 / span 6
        minHeight: 440px
      - id: api_execution_gnosis_app_swaps_by_solver_weekly
        gridRow: 3
        gridColumn: 7 / span 6
        minHeight: 440px
