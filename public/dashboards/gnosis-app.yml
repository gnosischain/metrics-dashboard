tabs:
  - name: Overview
    order: 1
    icon: 📊
    iconClass: chart-line
    resolutionToggle: true
    defaultResolution: weekly
    timeRanges: true
    metrics:
      # KPI row
      - id: api_execution_gnosis_app_kpi_total_users
        gridRow: 1
        gridColumn: 1 / span 3
        minHeight: 120px
      - id: api_execution_gnosis_app_kpi_new_users_7d
        gridRow: 1
        gridColumn: 4 / span 3
        minHeight: 120px
      - id: api_execution_gnosis_app_kpi_swaps_7d
        gridRow: 1
        gridColumn: 7 / span 3
        minHeight: 120px
      - id: api_execution_gnosis_app_kpi_topup_volume_7d
        gridRow: 1
        gridColumn: 10 / span 3
        minHeight: 120px
      # Time series
      - id: api_execution_gnosis_app_users_activity_weekly
        gridRow: 2
        gridColumn: 1 / span 6
        minHeight: 470px
      - id: api_execution_gnosis_app_activity_by_action_weekly
        gridRow: 2
        gridColumn: 7 / span 6
        minHeight: 470px

