tabs:
  - name: Feed
    order: 1
    icon: "⚡"
    iconClass: "activity"
    metrics:
      # Row 1: freshness banner (data lag)
      - id: api_execution_live_trades_freshness
        gridRow: 1
        gridColumn: 1 / span 12
        minHeight: 90px

      # Row 2: 4 KPI tiles
      - id: api_execution_live_trades_stats_count
        gridRow: 2
        gridColumn: 1 / span 3
        minHeight: 110px
      - id: api_execution_live_trades_stats_volume
        gridRow: 2
        gridColumn: 4 / span 3
        minHeight: 110px
      - id: api_execution_live_trades_stats_traders
        gridRow: 2
        gridColumn: 7 / span 3
        minHeight: 110px
      - id: api_execution_live_trades_stats_aggregator
        gridRow: 2
        gridColumn: 10 / span 3
        minHeight: 110px

      # Row 3: the main trades feed
      - id: api_execution_live_trades
        gridRow: 3
        gridColumn: 1 / span 12
        minHeight: 600px
