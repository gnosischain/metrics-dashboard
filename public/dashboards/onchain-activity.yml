tabs:
  - name: Overview
    description: Projects, sectors, transactions and active accounts
    order: 1
    icon: 📊
    iconClass: chart-line
    metrics:
      - id: api_crawlers_data_distinct_projects_total
        gridRow: 1
        gridColumn: 1 / span 3
        minHeight: 120px
      - id: api_crawlers_data_distinct_sectors_total
        gridRow: 1
        gridColumn: 4 / span 3
        minHeight: 120px
      - id: api_execution_transactions_total
        gridRow: 2
        gridColumn: 1 / span 3
        minHeight: 120px
      - id: api_execution_transactions_active_accounts_total
        gridRow: 2
        gridColumn: 4 / span 3
        minHeight: 120px
      - id: text_onchain_projects_sectors_overview_info
        gridRow: 1 / span 2
        gridColumn: 7 / span 6
        minHeight: 252px
      - id: text_onchain_projects_sectors_glossary
        gridRow: 3
        gridColumn: 1 / span 12
  - name: Transactions
    description: Counts by project and sector over time
    order: 2
    icon: 🔁
    iconClass: transaction
    metrics:
      - id: api_execution_transactions_7d
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 120px
      - id: api_execution_transactions_total
        gridRow: 2
        gridColumn: 1 / span 6
        minHeight: 120px
      - id: api_execution_transactions_by_project_ranges_top20
        gridRow: 1 / span 2
        gridColumn: 7 / span 6
        minHeight: 252px
      - id: api_execution_transactions_by_project_monthly_top5
        gridRow: 3
        gridColumn: 1 / span 6
        minHeight: 420px
      - id: api_execution_transactions_by_sector_hourly
        gridRow: 3
        gridColumn: 7 / span 6
        minHeight: 420px
      - id: api_execution_transactions_by_sector_weekly
        gridRow: 4
        gridColumn: 1 / span 12
        minHeight: 420px
  - name: Gas & Fees
    description: Native fees and gas used by project and sector
    order: 3
    icon: ⛽️
    iconClass: gas-usage
    metrics:
      - id: api_execution_transactions_fees_native_7d
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 120px
      - id: api_execution_transactions_fees_native_total
        gridRow: 2
        gridColumn: 1 / span 6
        minHeight: 120px
      - id: api_execution_transactions_fees_native_by_project_ranges_top20
        gridRow: 1 / span 2
        gridColumn: 7 / span 6
        minHeight: 252px
      - id: api_execution_transactions_fees_native_by_project_monthly_top5
        gridRow: 3
        gridColumn: 1 / span 6
        minHeight: 420px
      - id: api_execution_transactions_fees_native_by_sector_hourly
        gridRow: 3
        gridColumn: 7 / span 6
        minHeight: 420px
      - id: api_execution_transactions_fees_native_by_sector_weekly
        gridRow: 4
        gridColumn: 1 / span 12
        minHeight: 420px
      - id: api_execution_transactions_gas_used_weekly
        gridRow: 5
        gridColumn: 1 / span 12
        minHeight: 420px
  - name: Initiator Accounts
    description: Active sending accounts by project and sector
    order: 4
    icon: 👥
    iconClass: users
    metrics:
      - id: api_execution_transactions_active_accounts_7d
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 120px
      - id: api_execution_transactions_active_accounts_total
        gridRow: 2
        gridColumn: 1 / span 6
        minHeight: 120px
      - id: api_execution_transactions_active_accounts_by_project_ranges_top20
        gridRow: 1 / span 2
        gridColumn: 7 / span 6
        minHeight: 252px
      - id: api_execution_transactions_active_accounts_by_project_monthly_top5
        gridRow: 3
        gridColumn: 1 / span 6
        minHeight: 420px
      - id: api_execution_transactions_active_accounts_by_sector_hourly
        gridRow: 3
        gridColumn: 7 / span 6
        minHeight: 420px
      - id: api_execution_transactions_active_accounts_by_sector_weekly
        gridRow: 4
        gridColumn: 1 / span 12
        minHeight: 420px
