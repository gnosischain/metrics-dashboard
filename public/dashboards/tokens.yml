tabs:
  - name: Overview
    order: 1
    icon: 📊
    iconClass: chart-line
    globalFilterField: token_class
    globalFilterLabel: Token Class
    metrics:
      - id: global_filter
        gridRow: 1
        gridColumn: 1 / span 4
        minHeight: 30px
      - id: api_execution_tokens_supply_distribution_latest
        gridRow: 2 / span 2
        gridColumn: 1 / span 4
        minHeight: 285px
      - id: api_execution_tokens_supply_by_sector_latest
        gridRow: 4
        gridColumn: 1 / span 4
        minHeight: 285px
      - id: api_execution_tokens_supply_by_class_daily
        gridRow: 1 / span 4
        gridColumn: 5 / span 8
        minHeight: 624px
  - name: Per-token breakdown
    order: 2
    icon: 🪙
    iconClass: coins
    globalFilterField: token
    globalControlsPlacement: top
    unitToggle: true
    defaultUnit: native
    timeRanges: true
    metrics:
      - id: api_execution_tokens_supply_total
        gridRow: 1
        gridColumn: 1 / span 6
        minHeight: 90px
      - id: api_execution_tokens_holders_total
        gridRow: 1
        gridColumn: 7 / span 6
        minHeight: 90px
      - id: api_execution_tokens_balance_cohorts_value_daily
        gridRow: 2
        gridColumn: 1 / span 6
        minHeight: 450px
      - id: api_execution_tokens_balance_cohorts_holders_daily
        gridRow: 2
        gridColumn: 7 / span 6
        minHeight: 450px
      - id: api_execution_tokens_volume_daily
        gridRow: 3
        gridColumn: 1 / span 6
        minHeight: 350px
      - id: api_execution_tokens_active_senders_daily
        gridRow: 3
        gridColumn: 7 / span 6
        minHeight: 350px
