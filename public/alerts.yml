# Per-tab / per-dashboard alert banners rendered in the page header.
#
# Each entry:
#   scope:   dashboardId  (applies to every tab in that dashboard)
#            dashboardId.tabId  (applies only to that tab)
#            *   (applies to every dashboard view)
#   level:   info | success | warning | error         (default: info)
#   message: one-line body shown in the banner
#   title:   optional short heading rendered before the message
#   until:   optional ISO timestamp — alert auto-hides after this time
#
# Example entries below — delete or edit freely.

alerts:
  - scope: gnosisrevenue
    level: warning
    title: "Work in progress"
    message: "Gnosis Revenue metrics are under active development — figures may be incomplete or subject to change."

